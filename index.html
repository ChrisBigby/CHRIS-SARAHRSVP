<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Wedding RSVP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Unna:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* Basic Reset & Anti-Smart-Zoom */
        html, body {
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%; 
            text-size-adjust: 100%;
            background-color: #f6f0e6; 
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Full-Screen Video Background */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
            object-fit: cover; 
            object-position: center; 
        }

        /* RSVP Container */
        .rsvp-container {
            position: relative;
            z-index: 10; 
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            max-height: 95vh;
            overflow-y: auto; 
        }

        /* Form Wrapper */
        #formWrapper {
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        #formWrapper.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Elegant Unna Typography */
        h2 {
            font-family: 'Unna', serif;
            font-size: 5rem; 
            font-weight: 400;
            color: #3b332d; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 0.35em; 
            margin-left: 0.35em; 
            text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8);
        }

        .deadline-text {
            font-family: 'Unna', serif;
            font-size: 0.95rem; 
            font-weight: 400;
            color: #4a4135;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px; 
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        /* =========================================
           COUNTDOWN TIMER STYLES
           ========================================= */
        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 40px;
        }

        .countdown-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 70px;
        }

        .countdown-number {
            font-family: 'Unna', serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #b8925a; /* Elegant muted gold/bronze matching your photo */
            line-height: 1;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
        }

        .countdown-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            font-weight: 500;
            color: #5c5041;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
        }

        .countdown-separator {
            font-family: 'Unna', serif;
            font-size: 2rem;
            color: #b8925a;
            line-height: 1.2;
            margin-top: 8px; /* Centers the dot between the numbers */
            opacity: 0.7;
        }

        /* ========================================= */

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #4a4135;
            font-family: 'Unna', serif;
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px; 
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
        }

        /* Seamless Input Fields & Textarea */
        input, select, textarea {
            width: 100%;
            padding: 10px 5px;
            margin-bottom: 30px;
            background-color: transparent;
            border: none;
            border-bottom: 1.5px solid #7a6e5a;
            color: #3b3329;
            font-family: 'Unna', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            box-sizing: border-box;
            outline: none;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
            -webkit-appearance: none;
            border-radius: 0;
        }

        textarea {
            resize: none;
            margin-bottom: 15px;
        }

        input:focus, select:focus, textarea:focus {
            border-bottom: 2px solid #3b3329;
        }

        input::placeholder, textarea::placeholder {
            color: #9c9182;
            font-style: italic;
        }

        /* Message Toggle Button & Animation */
        .message-toggle {
            font-family: 'Unna', serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: #5c5041;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin: 0 auto 25px auto;
            display: inline-block;
            border-bottom: 1px dashed #7a6e5a;
            transition: color 0.3s ease;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
        }

        .message-toggle:hover {
            color: #3b3329;
            border-bottom-style: solid;
        }

        .message-container {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.6s ease, opacity 0.6s ease;
        }

        .message-container.open {
            max-height: 150px;
            opacity: 1;
        }

        /* Elegant Submit Button */
        button {
            width: 80%;
            padding: 18px;
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #4a4135;
            border: 1.5px solid #7a6e5a;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: 'Unna', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(2px);
        }

        button:hover {
            background-color: rgba(122, 110, 90, 0.2);
            color: #2e2821;
        }

        .note-text {
            font-family: 'Unna', serif;
            font-size: 0.85rem;
            color: #3b332d;
            margin-top: 20px;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.5;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
        }

        /* Button Loading Animation */
        .btn-loading {
            animation: pulse 1.5s infinite ease-in-out;
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0.5);
            border-color: #4a4135;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.97); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Dynamic Message Styling */
        #dynamicMessage {
            display: none;
            opacity: 0;
            color: #4a5c4e;
            font-family: 'Unna', serif;
            font-size: 1.3rem;
            letter-spacing: 1.5px;
            margin-top: 30px;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
            line-height: 1.8;
        }

        /* Styling for the "Thank You!" Header */
        .thank-you-title {
            font-family: 'Unna', serif;
            font-size: 4.5rem; 
            font-weight: 400;
            color: #3b332d; 
            text-transform: uppercase;
            letter-spacing: 0.25em; 
            display: block; 
            margin-bottom: 20px; 
            text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8);
        }

        .message-subtitle {
            display: block;
            font-size: 1.3rem;
            line-height: 1.6;
        }
        
        #dynamicMessage a {
            color: #5c5041;
            text-decoration: none;
            border-bottom: 1px solid #5c5041;
            transition: color 0.3s ease;
        }
        
        #dynamicMessage a:hover {
            color: #3b3329;
            border-bottom: 1px solid #3b3329;
        }

        .fade-in-up {
            display: block !important;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .rsvp-container {
                width: 95%; 
                padding: 10px;
            }

            h2 {
                font-size: 3.5rem; 
                letter-spacing: 0.25em; 
                margin-left: 0.25em;
                margin-bottom: 15px;
            }

            .deadline-text {
                font-size: 0.75rem; 
                margin-bottom: 20px;
                letter-spacing: 1px;
                line-height: 1.6;
            }

            /* Responsive Countdown Scaling */
            .countdown-container {
                gap: 8px;
                margin-bottom: 30px;
            }
            
            .countdown-block {
                width: 55px;
            }

            .countdown-number {
                font-size: 2.2rem;
            }

            .countdown-label {
                font-size: 0.5rem;
                letter-spacing: 1px;
            }

            .countdown-separator {
                font-size: 1.5rem;
                margin-top: 6px;
            }

            label {
                font-size: 0.95rem; 
                letter-spacing: 1.5px;
            }

            input, select, textarea {
                font-size: 16px !important; 
                padding: 8px 4px;
                margin-bottom: 25px;
            }

            button {
                width: 95%; 
                padding: 15px;
                font-size: 0.95rem;
                letter-spacing: 3px;
            }

            .note-text {
                font-size: 0.75rem;
            }

            #dynamicMessage {
                font-size: 1.15rem; 
            }

            .thank-you-title {
                font-size: 2.8rem;
                letter-spacing: 0.15em;
            }

            .message-subtitle {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>

    <video autoplay muted playsinline id="bgVideo"></video>

    <div class="rsvp-container">
        
        <div id="formWrapper">
            <h2>RSVP</h2>
            <p class="deadline-text">The favor of your reply is requested on or before <span style="white-space: nowrap;">August 10, 2026</span>.</p>
            
            <div class="countdown-container">
                <div class="countdown-block">
                    <span class="countdown-number" id="cd-days">00</span>
                    <span class="countdown-label">Days</span>
                </div>
                <span class="countdown-separator">&middot;</span>
                <div class="countdown-block">
                    <span class="countdown-number" id="cd-hours">00</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <span class="countdown-separator">&middot;</span>
                <div class="countdown-block">
                    <span class="countdown-number" id="cd-minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <span class="countdown-separator">&middot;</span>
                <div class="countdown-block">
                    <span class="countdown-number" id="cd-seconds">00</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>

            <form id="rsvpForm">
                <label>Name:</label>
                <input type="text" name="name" placeholder="Please enter your full name" required>
                
                <label>Email:</label>
                <input type="email" name="email" placeholder="Please enter your email address" required>
                
                <label>Will you be attending?</label>
                <select name="attending" required>
                    <option value="" disabled selected>Kindly select an option</option>
                    <option value="Yes">Joyfully Accepts</option>
                    <option value="No">Regretfully Declines</option>
                </select>

                <div id="messageToggle" class="message-toggle">Leave a message for the couple +</div>
                
                <div id="messageContainer" class="message-container">
                    <textarea name="message" placeholder="Write your warm wishes here..." rows="3"></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Send Reply</button>
                <p class="note-text">Note: You can only submit 1 response. If you have a change of mind, please reach out to us via FB Messenger.</p>
            </form>
        </div>

        <p id="dynamicMessage"></p>

    </div>

    <script>
        // --- DEVICE DETECTION & TIMEOUT VIDEO PAUSE FIX ---
        const bgVideo = document.getElementById('bgVideo');
        
        const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;

        if (isMobileDevice) {
            bgVideo.src = 'background-mobile.mp4';
            bgVideo.loop = false; 
            
            bgVideo.addEventListener('timeupdate', function() {
                if (bgVideo.duration && bgVideo.currentTime >= bgVideo.duration - 0.5) {
                    bgVideo.pause();
                }
            });

        } else {
            bgVideo.src = 'background.mp4';
            bgVideo.loop = true;  
        }
        
        bgVideo.load();
        
        bgVideo.play().catch(function(error) {
            console.log("Browser autoplay blocked, video will remain paused.");
        });

        // --- REAL-TIME COUNTDOWN TIMER ---
        const countDownDate = new Date("August 10, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("cd-days").innerText = "00";
                document.getElementById("cd-hours").innerText = "00";
                document.getElementById("cd-minutes").innerText = "00";
                document.getElementById("cd-seconds").innerText = "00";
                return;
            }

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Adding the "0" padding so it always looks clean (e.g., 09 instead of 9)
            document.getElementById("cd-days").innerText = days.toString().padStart(2, '0');
            document.getElementById("cd-hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("cd-minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("cd-seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);

        // --- MESSAGE TOGGLE ANIMATION ---
        const messageToggle = document.getElementById('messageToggle');
        const messageContainer = document.getElementById('messageContainer');

        messageToggle.addEventListener('click', () => {
            messageContainer.classList.toggle('open');
            if (messageContainer.classList.contains('open')) {
                messageToggle.innerText = "Leave a message for the couple -";
            } else {
                messageToggle.innerText = "Leave a message for the couple +";
            }
        });

        // --- RSVP FORM LOGIC ---
        const formWrapper = document.getElementById('formWrapper');
        const form = document.getElementById('rsvpForm');
        const submitBtn = document.getElementById('submitBtn');
        const dynamicMessage = document.getElementById('dynamicMessage');

        // *** PASTE YOUR GOOGLE SCRIPT URL HERE ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw278gjb0ayz_5eMSZb0We8evxxnxgmPTzUQiPg8rBAmXkCJMr6Jl-xKJXZGqdLXFhFBw/exec';

        const msgReturnVisitorYes = "Hi there! Thank you so much for your previous response. We have everything we need and look forward to seeing you soon!";
        const msgReturnVisitorNo = "Change of plans? If you can make it after all, we’d love to have you! Just let us know by sending an email to: <a href='mailto:chrisubarre04@gmail.com'>chrisubarre04@gmail.com</a> or <a href='mailto:castorsarahjean03@gmail.com'>castorsarahjean03@gmail.com</a>.";
        const msgAccept = "<span class='thank-you-title'>Thank you!</span><span class='message-subtitle'>Your response has been received. We're excited to celebrate our big day with you!</span>";
        const msgDecline = "We completely understand, no worries at all! Your warm wishes are more than enough to bless our special day.";

        // CHECK MEMORY ON PAGE LOAD
        const previousStatus = localStorage.getItem('weddingRsvpStatus');
        if (previousStatus) {
            formWrapper.style.display = 'none';
            
            if (previousStatus === 'No') {
                dynamicMessage.innerHTML = msgReturnVisitorNo;
            } else {
                dynamicMessage.innerHTML = msgReturnVisitorYes;
            }
            
            dynamicMessage.style.display = 'block';
            dynamicMessage.style.opacity = '1'; 
        }

        // HANDLE NEW SUBMISSIONS
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            submitBtn.classList.add('btn-loading');
            submitBtn.innerText = 'Sending...';

            const formData = new FormData(form);
            const attendingStatus = formData.get('attending'); 

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    localStorage.setItem('weddingRsvpStatus', attendingStatus);
                    formWrapper.classList.add('fade-out');
                    
                    setTimeout(() => {
                        formWrapper.style.display = 'none';
                        
                        if (attendingStatus === 'No') {
                            dynamicMessage.innerHTML = msgDecline;
                        } else {
                            dynamicMessage.innerHTML = msgAccept;
                        }

                        dynamicMessage.classList.add('fade-in-up');
                    }, 600); 
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.innerText = 'Send Reply';
                    alert('There was an error submitting your RSVP. Please try again.');
                });
        });
    </script>

</body>
</html>
