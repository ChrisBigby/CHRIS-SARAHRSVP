<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding RSVP</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* Basic Reset */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #f6f0e6;
        }

        /* Full-Screen Video Background */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1; 
            transform: translate(-50%, -50%);
            object-fit: cover; 
        }

        /* RSVP Container */
        .rsvp-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        /* Form Wrapper (Holds Header & Form for smooth fading) */
        #formWrapper {
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        #formWrapper.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Typography */
        h2 {
            font-family: 'Alex Brush', cursive;
            font-size: 5rem;
            font-weight: normal;
            color: #5c5041; 
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8);
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #4a4135;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
        }

        /* Seamless Input Fields */
        input, select {
            width: 100%;
            padding: 10px 5px;
            margin-bottom: 30px;
            background-color: transparent;
            border: none;
            border-bottom: 1.5px solid #7a6e5a;
            color: #3b3329;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            box-sizing: border-box;
            outline: none;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.8);
            -webkit-appearance: none;
            border-radius: 0;
        }

        input:focus, select:focus {
            border-bottom: 2px solid #3b3329;
        }

        input::placeholder {
            color: #9c9182;
            font-style: italic;
        }

        /* Elegant Button */
        button {
            width: 80%;
            padding: 15px;
            margin-top: 10px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #4a4135;
            border: 1.5px solid #7a6e5a;
            border-radius: 50px;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(2px);
        }

        button:hover {
            background-color: rgba(122, 110, 90, 0.2);
            color: #2e2821;
        }

        /* Button Loading Animation */
        .btn-loading {
            animation: pulse 1.5s infinite ease-in-out;
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0.5);
            border-color: #4a4135;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.97); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Dynamic Message Styling */
        #dynamicMessage {
            display: none;
            opacity: 0;
            color: #4a5c4e;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-style: italic;
            margin-top: 30px;
            text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.9);
            line-height: 1.4;
        }

        .fade-in-up {
            display: block !important;
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="rsvp-container">
        
        <div id="formWrapper">
            <h2>RSVP</h2>
            <form id="rsvpForm">
                <label>Name:</label>
                <input type="text" name="name" placeholder="Please enter your full name" required>
                
                <label>Will you be attending?</label>
                <select name="attending" required>
                    <option value="" disabled selected>Kindly select an option</option>
                    <option value="Yes">Joyfully Accept</option>
                    <option value="No">Regretfully Decline</option>
                </select>
                
                <button type="submit" id="submitBtn">Send Reply</button>
            </form>
        </div>

        <p id="dynamicMessage"></p>

    </div>

    <script>
        const formWrapper = document.getElementById('formWrapper');
        const form = document.getElementById('rsvpForm');
        const submitBtn = document.getElementById('submitBtn');
        const dynamicMessage = document.getElementById('dynamicMessage');

        // *** PASTE YOUR GOOGLE SCRIPT URL HERE ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw278gjb0ayz_5eMSZb0We8evxxnxgmPTzUQiPg8rBAmXkCJMr6Jl-xKJXZGqdLXFhFBw/exec';

        // Your Custom Messages
        const msgReturnVisitor = "Hi there! Thank you so much for your previous response. We have everything we need and look forward to seeing you soon!";
        const msgAccept = "Thank you! Your response has been beautifully recorded.";
        const msgDecline = "We completely understand, no worries at all! Your warm wishes are more than enough to bless our special day.";

        // 1. CHECK MEMORY ON PAGE LOAD
        if (localStorage.getItem('weddingRsvpStatus')) {
            formWrapper.style.display = 'none';
            dynamicMessage.innerText = msgReturnVisitor;
            dynamicMessage.style.display = 'block';
            dynamicMessage.style.opacity = '1'; 
        }

        // 2. HANDLE NEW SUBMISSIONS
        form.addEventListener('submit', e => {
            e.preventDefault();
            
            submitBtn.classList.add('btn-loading');
            submitBtn.innerText = 'Sending...';

            const formData = new FormData(form);
            const attendingStatus = form.attending.value; // Grabs "Yes" or "No"

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    // Remember they submitted
                    localStorage.setItem('weddingRsvpStatus', attendingStatus);

                    // Fade out the entire form wrapper (including the RSVP title)
                    formWrapper.classList.add('fade-out');
                    
                    // Wait for fade out, hide it completely, update text based on choice, and fade in message
                    setTimeout(() => {
                        formWrapper.style.display = 'none';
                        
                        // Dynamically choose message based on Yes/No
                        if (attendingStatus === 'Yes') {
                            dynamicMessage.innerText = msgAccept;
                        } else {
                            dynamicMessage.innerText = msgDecline;
                        }

                        dynamicMessage.classList.add('fade-in-up');
                    }, 600); 
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.innerText = 'Send Reply';
                    alert('There was an error submitting your RSVP. Please try again.');
                });
        });
    </script>

</body>
</html>
