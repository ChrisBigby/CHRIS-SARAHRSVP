<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding RSVP</title>
    <style>
        /* 1. Basic Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #f6f0e6; /* Soft beige fallback color while video loads */
        }

        /* 2. Full-Screen Video Background Styling */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1; /* Pushes the video behind your form */
            transform: translate(-50%, -50%);
            object-fit: cover; /* Stretches and crops video to fill screen without stretching distortion */
        }

        /* 3. RSVP Form Container */
        .rsvp-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            background-color: rgba(255, 255, 255, 0.85); /* Slightly transparent white to show the video behind it */
            border: 1px solid #d4c8b8;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(3px); /* Gives a beautiful modern frosted glass effect over the video */
        }

        /* 4. Text and Input Styling */
        h2 {
            font-weight: normal;
            color: #7a6e5a;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            color: #7a6e5a;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #d4c8b8;
            border-radius: 8px;
            background-color: #fdfdfd;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #8c7f6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #6e6151;
        }

        #successMessage {
            display: none;
            color: #5d8e64;
            font-size: 1.2em;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="background.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <div class="rsvp-container">
        <h2>RSVP</h2>
        <form id="rsvpForm">
            <label>Name(s):</label>
            <input type="text" name="name" placeholder="Full Name(s)" required>
            
            <label>Will you be attending?</label>
            <select name="attending" required>
                <option value="" disabled selected>Select an option</option>
                <option value="Yes">Joyfully Accept</option>
                <option value="No">Regretfully Decline</option>
            </select>
            
            <label>Total number in your party:</label>
            <input type="number" name="guests" placeholder="e.g. 2" min="0" required>
            
            <button type="submit" id="submitBtn">Send RSVP</button>
        </form>
        <p id="successMessage">Thank you! Your response has been received.</p>
    </div>

    <script>
        const form = document.getElementById('rsvpForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');

        // REPLACE THIS URL WITH YOUR ACTUAL WEB APP URL FROM GOOGLE SHEETS
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw278gjb0ayz_5eMSZb0We8evxxnxgmPTzUQiPg8rBAmXkCJMr6Jl-xKJXZGqdLXFhFBw/exec';

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;

            const formData = new FormData(form);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => {
                    form.style.display = 'none';
                    successMessage.style.display = 'block';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    submitBtn.innerText = 'Send RSVP';
                    submitBtn.disabled = false;
                    alert('There was an error submitting your RSVP. Please try again.');
                });
        });
    </script>

</body>
</html>
